name: create-epics-stories
description: 'Break requirements into epics and user stories'
module: lifecycle
agent: pm
config_resolved: "{project-root}/_gaia/lifecycle/.resolved/create-epics-stories.yaml"
config_source: "{project-root}/_gaia/lifecycle/config.yaml"
installed_path: "{project-root}/_gaia/lifecycle/workflows/3-solutioning/create-epics-stories"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"
input_file_patterns:
  prd:
    whole: "{planning_artifacts}/prd.md"
    load_strategy: "FULL_LOAD"
  architecture:
    whole: "{planning_artifacts}/architecture.md"
    load_strategy: "FULL_LOAD"
  test_plan:
    whole: "{test_artifacts}/test-plan.md"
    load_strategy: "FULL_LOAD"
  ux_design:
    whole: "{planning_artifacts}/ux-design.md"
    load_strategy: "FULL_LOAD"
quality_gates:
  pre_start:
    - check: "architecture_exists"
      on_fail: "HALT: Run create-architecture first"
    - check: "test_plan_exists"
      on_fail: "HALT: Test plan not found. Run /gaia-test-design first — test risk levels inform story sizing and ATDD decisions."
on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

output:
  primary: "{planning_artifacts}/epics-and-stories.md"

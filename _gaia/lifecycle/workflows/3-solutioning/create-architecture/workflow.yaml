name: create-architecture
description: 'Create architecture and solution design'
module: lifecycle
agent: architect
config_resolved: "{project-root}/_gaia/lifecycle/.resolved/create-architecture.yaml"
config_source: "{project-root}/_gaia/lifecycle/config.yaml"
installed_path: "{project-root}/_gaia/lifecycle/workflows/3-solutioning/create-architecture"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"
input_file_patterns:
  prd:
    whole: "{planning_artifacts}/prd.md"
    load_strategy: "FULL_LOAD"
  ux:
    whole: "{planning_artifacts}/ux-design.md"
    load_strategy: "FULL_LOAD"
  technical_research:
    whole: "{planning_artifacts}/technical-research.md"
    load_strategy: "FULL_LOAD"
  brownfield_assessment:
    whole: "{planning_artifacts}/brownfield-assessment.md"
    load_strategy: "FULL_LOAD"
  project_documentation:
    whole: "{planning_artifacts}/project-documentation.md"
    load_strategy: "INDEX_GUIDED"
  threat_model:
    whole: "{planning_artifacts}/threat-model.md"
    load_strategy: "INDEX_GUIDED"
quality_gates:
  pre_start:
    - check: "prd_exists"
      on_fail: "HALT: Run create-prd first"
  post_complete:
    - check: "test_plan_recommended"
      on_fail: "RECOMMEND: Architecture complete. Run /gaia-test-design next to create the test plan before creating epics."
on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

output:
  primary: "{planning_artifacts}/architecture.md"

name: validate-story
description: 'Validate story completeness and clarity'
module: lifecycle
agent: sm
config_resolved: "{project-root}/_gaia/lifecycle/.resolved/validate-story.yaml"
config_source: "{project-root}/_gaia/lifecycle/config.yaml"
installed_path: "{project-root}/_gaia/lifecycle/workflows/4-implementation/validate-story"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"
on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

output:
  primary: "{implementation_artifacts}/{story_key}-{story_title_slug}.md"

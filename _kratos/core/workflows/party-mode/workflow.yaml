# Party Mode Workflow
# Orchestrates group discussions between all installed KRATOS agents

name: party-mode
display_name: "Party Mode — Multi-Agent Discussion"
description: "Orchestrates group discussions between all installed KRATOS agents"
module: core
agent: orchestrator

instructions: "{installed_path}/core/workflows/party-mode/steps"

config_source: "{installed_path}/core/config.yaml"

steps:
  - file: "step-01-agent-loading.md"
    title: "Agent Loading"
  - file: "step-02-discussion-orchestration.md"
    title: "Discussion Orchestration"
  - file: "step-03-graceful-exit.md"
    title: "Graceful Exit"

output:
  primary: "{creative_artifacts}/party-mode-{date}.md"

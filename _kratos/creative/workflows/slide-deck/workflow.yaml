name: slide-deck
description: 'Create a presentation slide deck with narrative arc and visual design'
module: creative
agent: presentation-designer
config_resolved: "{project-root}/_kratos/creative/.resolved/slide-deck.yaml"
config_source: "{project-root}/_kratos/creative/config.yaml"
installed_path: "{project-root}/_kratos/creative/workflows/slide-deck"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"
on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

output:
  primary: "{creative_artifacts}/slide-deck-{date}.md"

name: problem-solving
description: 'Apply systematic problem-solving methodologies to complex challenges'
module: creative
agent: problem-solver
config_resolved: "{project-root}/_kratos/creative/.resolved/problem-solving.yaml"
config_source: "{project-root}/_kratos/creative/config.yaml"
installed_path: "{project-root}/_kratos/creative/workflows/problem-solving"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"
output:
  primary: "{creative_artifacts}/problem-solving-{date}.md"
data_files:
  methods: "{data_path}/solving-methods.csv"

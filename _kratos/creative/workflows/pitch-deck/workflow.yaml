name: pitch-deck
description: 'Create an investor/partner pitch deck with standard structure'
module: creative
agent: presentation-designer
config_resolved: "{project-root}/_kratos/creative/.resolved/pitch-deck.yaml"
config_source: "{project-root}/_kratos/creative/config.yaml"
installed_path: "{project-root}/_kratos/creative/workflows/pitch-deck"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"
on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

output:
  primary: "{creative_artifacts}/pitch-deck-{date}.md"

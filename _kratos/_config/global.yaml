# Kratos Framework — Global Configuration
# Single source of truth for all shared settings.
# After modifying this file, run /kratos-build-configs to regenerate resolved configs.

framework_name: "KRATOS"
framework_version: "1.27.56"

# User settings
user_name: "Jlouage"
communication_language: "English"
document_output_language: "English"
user_skill_level: "intermediate"  # beginner | intermediate | expert

# Project settings
project_name: "GT-AI-Workflows"
project_root: "{project-root}"
install_profile: "full"

# Output paths
output_folder: "{project-root}/docs"
planning_artifacts: "{project-root}/docs/planning-artifacts"
implementation_artifacts: "{project-root}/docs/implementation-artifacts"
test_artifacts: "{project-root}/docs/test-artifacts"
creative_artifacts: "{project-root}/docs/creative-artifacts"

# Documentation constraints
markdown_max_lines_per_file: 1000
markdown_overflow_action: "shard"
markdown_shard_split_level: "H2"

# Framework paths
installed_path: "{project-root}/_kratos"
config_path: "{project-root}/_kratos/_config"
memory_path: "{project-root}/_kratos/_memory"
checkpoint_path: "{project-root}/_kratos/_memory/checkpoints"

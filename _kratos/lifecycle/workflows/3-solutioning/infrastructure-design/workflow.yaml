name: infrastructure-design
description: 'Design deployment topology, IaC structure, and observability plan'
module: lifecycle
agent: devops
config_resolved: "{project-root}/_kratos/lifecycle/.resolved/infrastructure-design.yaml"
config_source: "{project-root}/_kratos/lifecycle/config.yaml"
installed_path: "{project-root}/_kratos/lifecycle/workflows/3-solutioning/infrastructure-design"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"
input_file_patterns:
  architecture:
    whole: "{planning_artifacts}/architecture.md"
    load_strategy: "FULL_LOAD"
quality_gates:
  pre_start:
    - check: "architecture_exists"
      on_fail: "HALT: Run create-architecture first — infrastructure design requires architecture doc"
on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

output:
  primary: "{planning_artifacts}/infrastructure-design.md"

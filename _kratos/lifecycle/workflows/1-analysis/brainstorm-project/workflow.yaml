name: brainstorm-project
description: 'Brainstorm a new project idea with structured techniques'
module: lifecycle
agent: analyst
config_resolved: "{project-root}/_kratos/lifecycle/.resolved/brainstorm-project.yaml"
config_source: "{project-root}/_kratos/lifecycle/config.yaml"
installed_path: "{project-root}/_kratos/lifecycle/workflows/1-analysis/brainstorm-project"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"
input_file_patterns:
  creative_outputs:
    whole: "{creative_artifacts}/*.md"
    load_strategy: "INDEX_GUIDED"
on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

output:
  primary: "{planning_artifacts}/project-brainstorm.md"

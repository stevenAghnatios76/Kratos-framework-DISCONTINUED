name: create-product-brief
description: 'Create product brief through collaborative discovery'
module: lifecycle
agent: analyst
config_resolved: "{project-root}/_kratos/lifecycle/.resolved/create-product-brief.yaml"
config_source: "{project-root}/_kratos/lifecycle/config.yaml"
installed_path: "{project-root}/_kratos/lifecycle/workflows/1-analysis/create-product-brief"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"
input_file_patterns:
  brainstorm:
    whole: "{planning_artifacts}/project-brainstorm.md"
    load_strategy: "FULL_LOAD"
  market_research:
    whole: "{planning_artifacts}/market-research.md"
    load_strategy: "FULL_LOAD"
  creative_outputs:
    whole: "{creative_artifacts}/*.md"
    load_strategy: "INDEX_GUIDED"
quality_gates:
  post_complete:
    - check: "product_brief_has_all_sections"
      on_fail: "HALT: Product brief must include: vision, target users, problem statement, proposed solution, success metrics"
on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

output:
  primary: "{planning_artifacts}/product-brief.md"

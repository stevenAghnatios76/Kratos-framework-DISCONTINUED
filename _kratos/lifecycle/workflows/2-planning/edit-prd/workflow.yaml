name: edit-prd
description: 'Edit an existing PRD'
module: lifecycle
agent: pm
config_resolved: "{project-root}/_kratos/lifecycle/.resolved/edit-prd.yaml"
config_source: "{project-root}/_kratos/lifecycle/config.yaml"
installed_path: "{project-root}/_kratos/lifecycle/workflows/2-planning/edit-prd"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"
input_file_patterns:
  prd:
    whole: "{planning_artifacts}/prd.md"
    load_strategy: "FULL_LOAD"
  architecture:
    whole: "{planning_artifacts}/architecture.md"
    load_strategy: "SELECTIVE_LOAD"
on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

output:
  primary: "{planning_artifacts}/prd.md"

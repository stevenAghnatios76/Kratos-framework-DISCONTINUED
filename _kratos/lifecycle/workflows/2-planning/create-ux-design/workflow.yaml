name: create-ux-design
description: 'Plan UX patterns and design specifications'
module: lifecycle
agent: ux-designer
config_resolved: "{project-root}/_kratos/lifecycle/.resolved/create-ux-design.yaml"
config_source: "{project-root}/_kratos/lifecycle/config.yaml"
installed_path: "{project-root}/_kratos/lifecycle/workflows/2-planning/create-ux-design"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"
input_file_patterns:
  prd:
    whole: "{planning_artifacts}/prd.md"
    load_strategy: "FULL_LOAD"
quality_gates:
  pre_start:
    - check: "prd_exists"
      on_fail: "HALT: Run create-prd first"
on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

output:
  primary: "{planning_artifacts}/ux-design.md"

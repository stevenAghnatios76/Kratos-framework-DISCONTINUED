name: create-prd
description: 'Create a Product Requirements Document from scratch'
module: lifecycle
agent: pm
config_resolved: "{project-root}/_kratos/lifecycle/.resolved/create-prd.yaml"
config_source: "{project-root}/_kratos/lifecycle/config.yaml"
installed_path: "{project-root}/_kratos/lifecycle/workflows/2-planning/create-prd"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"
input_file_patterns:
  product_brief:
    whole: "{planning_artifacts}/product-brief.md"
    load_strategy: "FULL_LOAD"
quality_gates:
  pre_start:
    - check: "product_brief_exists"
      on_fail: "HALT: Run create-product-brief first"
on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

output:
  primary: "{planning_artifacts}/prd.md"

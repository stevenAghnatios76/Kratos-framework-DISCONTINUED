name: validate-prd
description: 'Validate a PRD against standards'
module: lifecycle
agent: pm
config_resolved: "{project-root}/_kratos/lifecycle/.resolved/validate-prd.yaml"
config_source: "{project-root}/_kratos/lifecycle/config.yaml"
installed_path: "{project-root}/_kratos/lifecycle/workflows/2-planning/validate-prd"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"
input_file_patterns:
  prd:
    whole: "{planning_artifacts}/prd.md"
    load_strategy: "FULL_LOAD"
on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

output:
  primary: "{planning_artifacts}/prd-validation.md"

name: generate-project-context
description: 'Generate AI-optimized project context'
module: lifecycle
agent: analyst
config_resolved: "{project-root}/_kratos/lifecycle/.resolved/generate-project-context.yaml"
config_source: "{project-root}/_kratos/lifecycle/config.yaml"
installed_path: "{project-root}/_kratos/lifecycle/workflows/anytime/generate-project-context"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"
on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

output:
  primary: "{planning_artifacts}/project-context.md"

name: brownfield-onboarding
description: 'Apply KRATOS framework to an existing project with comprehensive developer knowledge base'
module: lifecycle
agent: orchestrator
config_resolved: "{project-root}/_kratos/lifecycle/.resolved/brownfield-onboarding.yaml"
config_source: "{project-root}/_kratos/lifecycle/config.yaml"
installed_path: "{project-root}/_kratos/lifecycle/workflows/anytime/brownfield-onboarding"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"
quality_gates:
  post_complete:
    - check: "nfr_assessment_exists"
      on_fail: "HALT: NFR assessment not found at {test_artifacts}/nfr-assessment.md."
    - check: "performance_test_plan_exists"
      on_fail: "HALT: Performance test plan not found at {test_artifacts}/. Run /kratos-perf-testing."
on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

output:
  primary: "{planning_artifacts}/brownfield-onboarding.md"
  artifacts:
    - "{planning_artifacts}/project-documentation.md"
    - "{planning_artifacts}/api-documentation.md"
    - "{planning_artifacts}/ux-design.md"
    - "{planning_artifacts}/event-catalog.md"
    - "{planning_artifacts}/dependency-map.md"
    - "{test_artifacts}/nfr-assessment.md"
    - "{test_artifacts}/performance-test-plan-{date}.md"
    - "{planning_artifacts}/prd.md"
    - "{planning_artifacts}/architecture.md"
    - "{planning_artifacts}/epics-and-stories.md"
    - "{planning_artifacts}/brownfield-onboarding.md"

name: memory-hygiene
description: 'Detect stale, contradicted, or superseded decisions in agent memory sidecars'
module: lifecycle
agent: orchestrator
config_resolved: "{project-root}/_kratos/lifecycle/.resolved/memory-hygiene.yaml"
config_source: "{project-root}/_kratos/lifecycle/config.yaml"
installed_path: "{project-root}/_kratos/lifecycle/workflows/anytime/memory-hygiene"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"
on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

output:
  primary: "{implementation_artifacts}/memory-hygiene-report-{date}.md"

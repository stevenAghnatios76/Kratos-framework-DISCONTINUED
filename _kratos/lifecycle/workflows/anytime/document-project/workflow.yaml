name: document-project
description: 'Document an existing project for AI context'
module: lifecycle
agent: analyst
config_resolved: "{project-root}/_kratos/lifecycle/.resolved/document-project.yaml"
config_source: "{project-root}/_kratos/lifecycle/config.yaml"
installed_path: "{project-root}/_kratos/lifecycle/workflows/anytime/document-project"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"
on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

output:
  primary: "{planning_artifacts}/project-documentation.md"

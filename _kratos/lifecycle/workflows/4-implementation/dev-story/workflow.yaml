name: dev-story
description: 'Execute story implementation following story spec'
module: lifecycle
agent: dev-*
execution_mode: planning
config_resolved: "{project-root}/_kratos/lifecycle/.resolved/dev-story.yaml"
config_source: "{project-root}/_kratos/lifecycle/config.yaml"
installed_path: "{project-root}/_kratos/lifecycle/workflows/4-implementation/dev-story"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"
required_skills:
  - "{project-root}/_kratos/dev/skills/git-workflow.md"
  - "{project-root}/_kratos/dev/skills/testing-patterns.md"
required_skill_sections:
  - "git-workflow:commits"
  - "git-workflow:pull-requests"
  - "testing-patterns:tdd-cycle"
quality_gates:
  pre_start:
    - check: "story_status == 'ready-for-dev'"
      on_fail: "HALT: Story must be in ready-for-dev status. Run /kratos-validate-story first to validate the story."
  post_complete:
    - check: "all_tests_pass == true"
      on_fail: "HALT: All tests must pass before marking complete."
input_file_patterns:
  story:
    whole: "{implementation_artifacts}/{{story_key}}.md"
    load_strategy: "FULL_LOAD"
on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"
story_statuses: [backlog, validating, ready-for-dev, in-progress, blocked, review, done]

output:
  primary: "{implementation_artifacts}/{story_key}.md"

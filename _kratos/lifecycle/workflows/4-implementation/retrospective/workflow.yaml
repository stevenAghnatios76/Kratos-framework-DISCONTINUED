name: retrospective
description: 'Post-sprint retrospective'
module: lifecycle
agent: sm
config_resolved: "{project-root}/_kratos/lifecycle/.resolved/retrospective.yaml"
config_source: "{project-root}/_kratos/lifecycle/config.yaml"
installed_path: "{project-root}/_kratos/lifecycle/workflows/4-implementation/retrospective"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"
input_file_patterns:
  status:
    whole: "{implementation_artifacts}/sprint-status.yaml"
    load_strategy: "FULL_LOAD"
on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

output:
  primary: "{implementation_artifacts}/retro-{sprint_id}.md"

name: add-stories
description: 'Add incremental stories to existing epics-and-stories.md from a change request'
module: lifecycle
agent: pm
config_resolved: "{project-root}/_kratos/lifecycle/.resolved/add-stories.yaml"
config_source: "{project-root}/_kratos/lifecycle/config.yaml"
installed_path: "{project-root}/_kratos/lifecycle/workflows/4-implementation/add-stories"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"
input_file_patterns:
  prd:
    whole: "{planning_artifacts}/prd.md"
    load_strategy: "SELECTIVE_LOAD"
  architecture:
    whole: "{planning_artifacts}/architecture.md"
    load_strategy: "SELECTIVE_LOAD"
  epics:
    whole: "{planning_artifacts}/epics-and-stories.md"
    load_strategy: "FULL_LOAD"
  test_plan:
    whole: "{test_artifacts}/test-plan.md"
    load_strategy: "SELECTIVE_LOAD"
quality_gates:
  pre_start:
    - check: "epics_exists"
      on_fail: "HALT: epics-and-stories.md does not exist. Run /kratos-create-epics first."
on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

output:
  primary: "{planning_artifacts}/epics-and-stories.md"

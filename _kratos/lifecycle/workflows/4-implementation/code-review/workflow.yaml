name: code-review
description: 'Perform code review on implemented story'
module: lifecycle
agent: dev-*
config_resolved: "{project-root}/_kratos/lifecycle/.resolved/code-review.yaml"
config_source: "{project-root}/_kratos/lifecycle/config.yaml"
installed_path: "{project-root}/_kratos/lifecycle/workflows/4-implementation/code-review"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"
quality_gates:
  pre_start:
    - check: "story_status == 'review'"
      on_fail: "HALT: Story must be in review status before code review"
on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

output:
  primary: "{implementation_artifacts}/{story_key}-review.md"
  secondary: "{implementation_artifacts}/{story_key}.md"

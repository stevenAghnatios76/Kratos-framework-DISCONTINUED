name: action-items
description: 'Process and resolve action items from retro, triage, tech-debt, and correct-course'
module: lifecycle
agent: orchestrator
template_output_prompt: "auto"
config_resolved: "{installed_path}/.resolved/action-items.yaml"
config_source: "{project-root}/_kratos/lifecycle/config.yaml"
installed_path: "{project-root}/_kratos/lifecycle/workflows/4-implementation/action-items"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"
input_file_patterns:
  action_items:
    whole: "{implementation_artifacts}/action-items.yaml"
    load_strategy: "FULL_LOAD"
on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

output:
  primary: "{implementation_artifacts}/action-items.yaml"

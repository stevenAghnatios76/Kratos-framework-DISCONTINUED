name: qa-generate-tests
description: 'Generate automated E2E and API tests'
module: lifecycle
agent: qa
config_resolved: "{project-root}/_kratos/lifecycle/.resolved/qa-generate-tests.yaml"
config_source: "{project-root}/_kratos/lifecycle/config.yaml"
installed_path: "{project-root}/_kratos/lifecycle/workflows/4-implementation/qa-generate-tests"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"
quality_gates:
  pre_start:
    - check: "story_status == 'review'"
      on_fail: "HALT: Story must be in review status before QA testing"
on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

output:
  primary: "{test_artifacts}/{story_key}-qa-tests.md"
  secondary: "{implementation_artifacts}/{story_key}.md"

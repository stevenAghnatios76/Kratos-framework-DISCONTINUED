name: fix-story
description: 'Fix story issues flagged by validation'
module: lifecycle
agent: sm
config_resolved: "{project-root}/_kratos/lifecycle/.resolved/fix-story.yaml"
config_source: "{project-root}/_kratos/lifecycle/config.yaml"
installed_path: "{project-root}/_kratos/lifecycle/workflows/4-implementation/fix-story"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"
template: "{project-root}/_kratos/lifecycle/templates/story-template.md"
on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

output:
  primary: "{implementation_artifacts}/{story_key}-{story_title_slug}.md"
  secondary: "{implementation_artifacts}/sprint-status.yaml"

name: correct-course
description: 'Manage significant sprint scope changes'
module: lifecycle
agent: sm
config_resolved: "{project-root}/_kratos/lifecycle/.resolved/correct-course.yaml"
config_source: "{project-root}/_kratos/lifecycle/config.yaml"
installed_path: "{project-root}/_kratos/lifecycle/workflows/4-implementation/correct-course"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"
input_file_patterns:
  status:
    whole: "{implementation_artifacts}/sprint-status.yaml"
    load_strategy: "FULL_LOAD"
  epics:
    whole: "{planning_artifacts}/epics-and-stories.md"
    load_strategy: "SELECTIVE_LOAD"
on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

output:
  primary: "{implementation_artifacts}/sprint-status.yaml"

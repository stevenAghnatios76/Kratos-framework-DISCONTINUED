name: create-story
description: 'Create detailed story file with implementation context'
module: lifecycle
agent: sm
config_resolved: "{project-root}/_kratos/lifecycle/.resolved/create-story.yaml"
config_source: "{project-root}/_kratos/lifecycle/config.yaml"
installed_path: "{project-root}/_kratos/lifecycle/workflows/4-implementation/create-story"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"
template: "{project-root}/_kratos/lifecycle/templates/story-template.md"
input_file_patterns:
  epics:
    whole: "{planning_artifacts}/epics-and-stories.md"
    load_strategy: "SELECTIVE_LOAD"
  architecture:
    whole: "{planning_artifacts}/architecture.md"
    load_strategy: "FULL_LOAD"
on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

output:
  primary: "{implementation_artifacts}/{story_key}-{story_title_slug}.md"
  secondary: "{implementation_artifacts}/sprint-status.yaml"

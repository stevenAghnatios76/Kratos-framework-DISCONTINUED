name: change-request
description: 'Impact-driven change request with analysis, approval gate, and cascade updates'
module: lifecycle
agent: pm
config_resolved: "{project-root}/_kratos/lifecycle/.resolved/change-request.yaml"
config_source: "{project-root}/_kratos/lifecycle/config.yaml"
installed_path: "{project-root}/_kratos/lifecycle/workflows/4-implementation/change-request"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"
input_file_patterns:
  prd:
    whole: "{planning_artifacts}/prd.md"
    load_strategy: "SELECTIVE_LOAD"
  architecture:
    whole: "{planning_artifacts}/architecture.md"
    load_strategy: "SELECTIVE_LOAD"
  epics:
    whole: "{planning_artifacts}/epics-and-stories.md"
    load_strategy: "SELECTIVE_LOAD"
  sprint_status:
    whole: "{implementation_artifacts}/sprint-status.yaml"
    load_strategy: "FULL_LOAD"
  test_plan:
    whole: "{test_artifacts}/test-plan.md"
    load_strategy: "SELECTIVE_LOAD"
  traceability:
    whole: "{test_artifacts}/traceability-matrix.md"
    load_strategy: "SELECTIVE_LOAD"
quality_gates:
  pre_start:
    - check: "prd.md exists"
      on_fail: "halt — no PRD to assess impact against. Run /kratos-create-prd first."
on_error:
  missing_file: "skip_and_note"
  unresolved_variable: "halt"

output:
  primary: "{planning_artifacts}/change-request-{cr_id}.md"

name: rollback-plan
description: 'Rollback trigger criteria and procedures'
module: lifecycle
agent: devops
config_resolved: "{project-root}/_kratos/lifecycle/.resolved/rollback-plan.yaml"
config_source: "{project-root}/_kratos/lifecycle/config.yaml"
installed_path: "{project-root}/_kratos/lifecycle/workflows/5-deployment/rollback-plan"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"
on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

output:
  primary: "{implementation_artifacts}/rollback-plan-{version}.md"

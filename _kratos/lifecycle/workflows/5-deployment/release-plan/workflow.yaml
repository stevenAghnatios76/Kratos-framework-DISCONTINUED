name: release-plan
description: 'Staged rollout and release strategy'
module: lifecycle
agent: devops
config_resolved: "{project-root}/_kratos/lifecycle/.resolved/release-plan.yaml"
config_source: "{project-root}/_kratos/lifecycle/config.yaml"
installed_path: "{project-root}/_kratos/lifecycle/workflows/5-deployment/release-plan"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"
input_file_patterns:
  architecture:
    whole: "{planning_artifacts}/architecture.md"
    load_strategy: "FULL_LOAD"
on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

output:
  primary: "{implementation_artifacts}/release-plan-{version}.md"

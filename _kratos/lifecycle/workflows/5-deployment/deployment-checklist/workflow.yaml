name: deployment-checklist
description: 'Pre-deployment verification checklist'
module: lifecycle
agent: devops
config_resolved: "{project-root}/_kratos/lifecycle/.resolved/deployment-checklist.yaml"
config_source: "{project-root}/_kratos/lifecycle/config.yaml"
installed_path: "{project-root}/_kratos/lifecycle/workflows/5-deployment/deployment-checklist"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"
input_file_patterns:
  architecture:
    whole: "{planning_artifacts}/architecture.md"
    load_strategy: "FULL_LOAD"
  infrastructure:
    whole: "{planning_artifacts}/infrastructure-design.md"
    load_strategy: "FULL_LOAD"
  traceability:
    whole: "{test_artifacts}/traceability-matrix.md"
    load_strategy: "FULL_LOAD"
  ci_setup:
    whole: "{test_artifacts}/ci-setup.md"
    load_strategy: "FULL_LOAD"
  readiness_report:
    whole: "{planning_artifacts}/readiness-report.md"
    load_strategy: "FULL_LOAD"
quality_gates:
  pre_start:
    - check: "traceability_exists"
      on_fail: "HALT: Run /kratos-trace before deployment."
    - check: "ci_setup_exists"
      on_fail: "HALT: Run /kratos-ci-setup before deployment."
    - check: "readiness_passed"
      on_fail: "HALT: Readiness report must show PASS. Run /kratos-readiness-check."
on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

output:
  primary: "{implementation_artifacts}/deployment-checklist-{date}.md"

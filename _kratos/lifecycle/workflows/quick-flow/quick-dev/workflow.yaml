name: quick-dev
description: 'Implement a quick spec'
module: lifecycle
agent: dev-*
config_resolved: "{project-root}/_kratos/lifecycle/.resolved/quick-dev.yaml"
config_source: "{project-root}/_kratos/lifecycle/config.yaml"
installed_path: "{project-root}/_kratos/lifecycle/workflows/quick-flow/quick-dev"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"
input_file_patterns:
  spec:
    whole: "{implementation_artifacts}/quick-spec-{{spec_name}}.md"
    load_strategy: "FULL_LOAD"
on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

output:
  primary: "source_code"
